on:
  push:
    branches: [master]
  pull_request:
jobs:
  lint:
    # Runs on `heavy`: its successful release matrix confirms that label is
    # available, while the required `light` queue is currently unavailable.
    runs-on: heavy
    steps:
      - uses: actions/checkout@v4
      - name: Install ruff
        run: |
          apt-get update -qq && apt-get install -y -qq python3 python3-venv
          python3 -m venv .venv-lint
          .venv-lint/bin/pip install --quiet "ruff>=0.15.11"
      - name: Lint
        run: .venv-lint/bin/ruff check .
  test:
    # PR-safe test job: ffmpeg + full dependency tree + the "not slow" suite.
    # Route to the confirmed-active `heavy` label so this required protected-
    # branch check cannot remain queued behind the unavailable `light` runner.
    runs-on: heavy
    steps:
      - uses: actions/checkout@v4
      - name: Install system dependencies
        run: apt-get update -qq && apt-get install -y -qq python3 python3-pip python3-venv ffmpeg
      - name: Install package
        run: |
          python3 -m venv .venv
          .venv/bin/pip install --quiet --upgrade pip
          .venv/bin/pip install --quiet -e ".[dev]"
      - name: Test
        run: .venv/bin/pytest tests/ -q -m "not slow" -n 4
  test-slow:
    # Slow real-media integration suite, skipped by the PR `test` job. Runs only
    # on push to master. Route to the confirmed-active `heavy` runner. Kept
    # serial (no -n) because these tests do heavier real I/O.
    if: ${{ github.event_name == 'push' }}
    runs-on: heavy
    steps:
      - uses: actions/checkout@v4
      - name: Install system dependencies
        run: apt-get update -qq && apt-get install -y -qq python3 python3-pip python3-venv ffmpeg
      - name: Install package
        run: |
          python3 -m venv .venv
          .venv/bin/pip install --quiet --upgrade pip
          .venv/bin/pip install --quiet -e ".[dev]"
      - name: Slow tests
        run: .venv/bin/pytest tests/ -q -m "slow"
  test-ffmpeg-matrix:
    # Cross-FFmpeg-version filtergraph portability matrix.
    #
    # WHY: the apt-based `test` job exercises exactly ONE ffmpeg — the runner
    # OS's build (currently 6.1.1). A filtergraph that parses on dev-local
    # ffmpeg 8 but not on 6 slips straight through. This bit us on 2026-07-09:
    # the composite masked-render path used `scale2ref=w=rw:h=rh`; the rw/rh
    # named vars were only added in ffmpeg 7, so it broke on the ffmpeg-6 CI
    # runner and was caught by luck, not design. This job downloads pinned
    # static ffmpeg 6/7/8 builds and runs the render/filtergraph tests against
    # each, so version-specific parse bugs fail loudly, every time.
    #
    # Additive coverage — the apt `test` job stays as-is. Routed to `heavy`
    # because real renders are CPU-heavy and must not load the capacity-1 VPS
    # that co-hosts production Forgejo. Not wired into required checks by
    # default (see PR note), so a heavy-runner outage leaves this pending, never
    # blocking PRs. Static builds are pinned to immutable BtbN release tags
    # (repo policy: pin exact versions); the per-leg version assert fails the
    # job if an asset ever drifts off its expected major.
    runs-on: heavy
    strategy:
      fail-fast: false
      matrix:
        include:
          - major: "6"
            ffmpeg_tag: autobuild-2025-08-31-13-00
            ffmpeg_asset: ffmpeg-n6.1.3-linux64-gpl-6.1.tar.xz
          - major: "7"
            # 7.1.0 (autobuild-2024-09-30) has an upstream `best_input >= 0`
            # assertion regression (ffmpeg_filter.c) that aborts on the glitch
            # engine's scale2ref+displace graphs; fixed by 7.1.5. Pin the fixed
            # month-end build, which BtbN retains for two years; daily builds
            # expire after 14 days.
            ffmpeg_tag: autobuild-2026-06-30-13-34
            ffmpeg_asset: ffmpeg-n7.1.5-1-g7d0e842004-linux64-gpl-7.1.tar.xz
          - major: "8"
            ffmpeg_tag: autobuild-2026-06-30-13-34
            ffmpeg_asset: ffmpeg-n8.1.2-21-gce3c09c101-linux64-gpl-8.1.tar.xz
    steps:
      - uses: actions/checkout@v4
      - name: Install Python toolchain
        run: apt-get update -qq && apt-get install -y -qq python3 python3-pip python3-venv curl xz-utils
      - name: Fetch pinned static FFmpeg ${{ matrix.major }}
        run: |
          set -euo pipefail
          url="https://github.com/BtbN/FFmpeg-Builds/releases/download/${{ matrix.ffmpeg_tag }}/${{ matrix.ffmpeg_asset }}"
          echo "Downloading $url"
          dest="${RUNNER_TEMP:-/tmp}/ffmpeg-static"
          mkdir -p "$dest"
          curl -fsSL --retry 3 --retry-delay 5 "$url" -o "${RUNNER_TEMP:-/tmp}/ffmpeg.tar.xz"
          tar -xf "${RUNNER_TEMP:-/tmp}/ffmpeg.tar.xz" -C "$dest"
          bindir="$(dirname "$(find "$dest" -type f -name ffmpeg | head -1)")"
          echo "Resolved static FFmpeg bin dir: $bindir"
          echo "$bindir" >> "$GITHUB_PATH"
      - name: Assert FFmpeg major is ${{ matrix.major }}
        run: |
          set -euo pipefail
          ver="$(ffmpeg -version | head -1)"
          echo "$ver"
          ffprobe -version | head -1
          case "$ver" in
            *"version n${{ matrix.major }}."*|*"version ${{ matrix.major }}."*)
              echo "FFmpeg major ${{ matrix.major }} confirmed." ;;
            *)
              echo "ERROR: expected FFmpeg major ${{ matrix.major }}, got: $ver" >&2
              exit 1 ;;
          esac
      - name: Install package
        run: |
          python3 -m venv .venv
          .venv/bin/pip install --quiet --upgrade pip
          .venv/bin/pip install --quiet -e ".[dev]"
      - name: Run compositor, workflow, and rescue portability tests
        # The matrix guards the ACTIVELY-DEVELOPED compositor + workflow
        # filtergraph surface — where the scale2ref=w=rw:h=rh FFmpeg-6 parse bug
        # lived — across pinned FFmpeg 6/7/8. These files are proven portable on
        # all three majors. The legacy filtergraph engines (glitch, transitions,
        # effects, advanced, real-media, filters) carry pre-existing quirks tied
        # to the FFmpeg BUILD, not our code (e.g. FFmpeg 7.1.0's best_input abort,
        # static-6.1.3 build-flag gaps) — they are covered by the `test` /
        # `test-slow` jobs on the runner's apt FFmpeg (the version that platform
        # actually ships). Runs slow AND not-slow: the masked-render regression is
        # gated on ffmpeg presence, not the `slow` marker. The rescue slice
        # exercises the public plan -> render -> inspect path, MOV/WebM sharing
        # copies, and reproducible render contracts on every supported major.
        run: |
          .venv/bin/pytest -q --tb=short -n 4 \
            tests/test_engine_composite_layers.py \
            tests/test_server_tools_composite_layers.py \
            tests/test_workflow_golden.py \
            tests/test_engine_overlay.py \
            tests/test_rescue_e2e.py::test_fix_this_clip_end_to_end \
            tests/test_rescue_e2e.py::test_container_inputs_produce_verified_universal_package \
            tests/test_rescue_e2e.py::test_plan_and_render_semantics_are_reproducible
