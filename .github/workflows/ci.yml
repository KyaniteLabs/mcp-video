name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

jobs:
  changes:
    name: Change detection
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.classify.outputs.code }}
      docker: ${{ steps.classify.outputs.docker }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - id: classify
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            base="${{ github.event.pull_request.base.sha }}"
            head="${{ github.event.pull_request.head.sha }}"
          else
            base="${{ github.event.before }}"
            head="${{ github.sha }}"
          fi
          if [[ -z "$base" || "$base" == "0000000000000000000000000000000000000000" ]]; then
            base="$(git rev-parse "$head^" 2>/dev/null || true)"
          fi
          changed="$(git diff --name-only "$base" "$head" 2>/dev/null || git diff --name-only HEAD^ HEAD)"
          printf '%s\n' "$changed"
          if printf '%s\n' "$changed" | grep -Eq '^(mcp_video/|tests/|pyproject\.toml|uv\.lock|Dockerfile|\.github/workflows/ci\.yml)'; then
            echo "code=true" >> "$GITHUB_OUTPUT"
          else
            echo "code=false" >> "$GITHUB_OUTPUT"
          fi
          if printf '%s\n' "$changed" | grep -Eq '^(Dockerfile|mcp_video/|pyproject\.toml|uv\.lock|\.dockerignore|\.github/workflows/ci\.yml)'; then
            echo "docker=true" >> "$GITHUB_OUTPUT"
          else
            echo "docker=false" >> "$GITHUB_OUTPUT"
          fi

  repository-readiness:
    name: Repository readiness
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Run repository readiness audit
        run: ./scripts/repo-readiness-audit.py

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install ruff
        run: pip install ruff
      - name: Ruff check
        run: ruff check mcp_video/
      - name: Ruff format check
        run: ruff format --check mcp_video/

  package-surface:
    name: Package surface
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install build tools
        run: pip install build
      - name: Build release artifacts
        run: python -m build --sdist --wheel
      - name: Check built artifact contents
        run: python3 .github/scripts/check-built-artifacts.py dist

  test:
    name: Test (Python 3.12)
    needs: changes
    runs-on: ubuntu-latest
    steps:
      - name: Skip tests
        if: github.event_name == 'pull_request' && needs.changes.outputs.code != 'true'
        run: echo "Code inputs unchanged; marking Python 3.12 test check successful."
      - uses: actions/checkout@v6
        if: github.event_name != 'pull_request' || needs.changes.outputs.code == 'true'
      - uses: actions/setup-python@v6
        if: github.event_name != 'pull_request' || needs.changes.outputs.code == 'true'
        with:
          python-version: "3.12"
          cache: pip
      - name: Install FFmpeg
        if: github.event_name != 'pull_request' || needs.changes.outputs.code == 'true'
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends ffmpeg
      - name: Install dependencies
        if: github.event_name != 'pull_request' || needs.changes.outputs.code == 'true'
        run: pip install -e ".[dev]"
      - name: Run tests
        if: github.event_name != 'pull_request' || needs.changes.outputs.code == 'true'
        run: pytest tests/ -q -m "not slow" --tb=short

  compatibility:
    name: Compatibility (Python ${{ matrix.python-version }})
    needs: changes
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.13"]
    steps:
      - name: Skip compatibility tests
        if: github.event_name == 'pull_request' && needs.changes.outputs.code != 'true'
        run: echo "Code inputs unchanged; marking Python ${{ matrix.python-version }} compatibility check successful."
      - uses: actions/checkout@v6
        if: github.event_name != 'pull_request' || needs.changes.outputs.code == 'true'
      - uses: actions/setup-python@v6
        if: github.event_name != 'pull_request' || needs.changes.outputs.code == 'true'
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install FFmpeg
        if: github.event_name != 'pull_request' || needs.changes.outputs.code == 'true'
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends ffmpeg
      - name: Install dependencies
        if: github.event_name != 'pull_request' || needs.changes.outputs.code == 'true'
        run: pip install -e ".[dev]"
      - name: Run tests
        if: github.event_name != 'pull_request' || needs.changes.outputs.code == 'true'
        run: pytest tests/ -q -m "not slow" --tb=short

  docker:
    name: Docker build
    needs: changes
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Skip Docker build
        if: github.event_name == 'pull_request' && needs.changes.outputs.docker != 'true'
        run: echo "Docker inputs unchanged; marking Docker check successful."
      - name: Build Docker image
        if: github.event_name != 'pull_request' || needs.changes.outputs.docker == 'true'
        run: docker build -t mcp-video:test .
