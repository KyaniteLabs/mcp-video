name: CI

on:
  push:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Change detection
    runs-on: blacksmith-2vcpu-ubuntu-2404
    outputs:
      code: ${{ steps.classify.outputs.code }}
      docker: ${{ steps.classify.outputs.docker }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
      - id: classify
        shell: bash
        run: |
          set -euo pipefail
          base="${{ github.event.before }}"
          head="${{ github.sha }}"
          if [[ -z "$base" || "$base" == "0000000000000000000000000000000000000000" ]]; then
            base="$(git rev-parse "$head^" 2>/dev/null || true)"
          fi
          changed="$(git diff --name-only "$base" "$head" 2>/dev/null || git diff --name-only HEAD^ HEAD)"
          printf '%s\n' "$changed"
          if printf '%s\n' "$changed" | grep -Eq '^(mcp_video/|tests/|pyproject\.toml|uv\.lock|Dockerfile|\.github/workflows/ci\.yml)'; then
            echo "code=true" >> "$GITHUB_OUTPUT"
          else
            echo "code=false" >> "$GITHUB_OUTPUT"
          fi
          if printf '%s\n' "$changed" | grep -Eq '^(Dockerfile|mcp_video/|pyproject\.toml|uv\.lock|\.dockerignore|\.github/workflows/ci\.yml)'; then
            echo "docker=true" >> "$GITHUB_OUTPUT"
          else
            echo "docker=false" >> "$GITHUB_OUTPUT"
          fi

  repository-readiness:
    name: Repository readiness
    runs-on: blacksmith-2vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.13'
          cache: 'pip'
          cache-dependency-path: 'pyproject.toml'
      - name: Create venv
        run: python -m venv .venv
      - name: Run repository readiness audit
        run: .venv/bin/python ./scripts/repo-readiness-audit.py

  lint:
    name: Lint
    runs-on: blacksmith-2vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.13'
          cache: 'pip'
          cache-dependency-path: 'pyproject.toml'
      - name: Create venv
        run: python -m venv .venv
      - name: Install ruff
        run: .venv/bin/pip install ruff
      - name: Ruff check
        run: .venv/bin/ruff check mcp_video/ tests/
      - name: Ruff format check
        run: .venv/bin/ruff format --check mcp_video/ tests/
      - name: Type check core modules
        run: |
          .venv/bin/pip install -e . pyright
          .venv/bin/pyright

  package-surface:
    name: Package surface
    runs-on: blacksmith-2vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.13'
          cache: 'pip'
          cache-dependency-path: 'pyproject.toml'
      - name: Create venv
        run: python -m venv .venv
      - name: Install build tools
        run: .venv/bin/pip install build
      - name: Build release artifacts
        run: .venv/bin/python -m build --sdist --wheel
      - name: Check built artifact contents
        run: .venv/bin/python .github/scripts/check-built-artifacts.py dist

  test:
    name: Test (Python 3.13)
    needs: changes
    runs-on: blacksmith-2vcpu-ubuntu-2404
    steps:
      - name: Skip tests
        if: needs.changes.outputs.code != 'true'
        run: echo "Code inputs unchanged; marking Python 3.13 test check successful."
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        if: needs.changes.outputs.code == 'true'
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        if: needs.changes.outputs.code == 'true'
        with:
          python-version: '3.13'
      - name: Create venv
        if: needs.changes.outputs.code == 'true'
        run: python -m venv .venv
      - name: Ensure FFmpeg
        if: needs.changes.outputs.code == 'true'
        run: |
          if ! command -v ffmpeg &>/dev/null; then
            sudo apt-get update
            sudo apt-get install -y ffmpeg
          fi
          ffmpeg -version
          ffprobe -version
      - name: Install dependencies
        if: needs.changes.outputs.code == 'true'
        run: .venv/bin/pip install -e ".[dev]"
      - name: Run tests with coverage
        if: needs.changes.outputs.code == 'true'
        run: .venv/bin/pytest tests/ -q -m "not slow" --tb=short --cov=mcp_video --cov-report=term

  compatibility:
    name: Compatibility (Python ${{ matrix.python-version }})
    needs: changes
    runs-on: blacksmith-2vcpu-ubuntu-2404
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - name: Skip compatibility tests
        if: needs.changes.outputs.code != 'true'
        run: echo "Code inputs unchanged; marking Python ${{ matrix.python-version }} compatibility check successful."
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        if: needs.changes.outputs.code == 'true'
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        if: needs.changes.outputs.code == 'true'
        with:
          python-version: ${{ matrix.python-version }}
      - name: Create venv
        if: needs.changes.outputs.code == 'true'
        run: python -m venv .venv
      - name: Ensure FFmpeg
        if: needs.changes.outputs.code == 'true'
        run: |
          if ! command -v ffmpeg &>/dev/null; then
            sudo apt-get update
            sudo apt-get install -y ffmpeg
          fi
          ffmpeg -version
          ffprobe -version
      - name: Install dependencies
        if: needs.changes.outputs.code == 'true'
        run: .venv/bin/pip install -e ".[dev]"
      - name: Run tests
        if: needs.changes.outputs.code == 'true'
        run: .venv/bin/pytest tests/ -q -m "not slow" --tb=short

  minimal-install:
    name: Minimal install (no extras)
    needs: changes
    runs-on: blacksmith-2vcpu-ubuntu-2404
    steps:
      - name: Skip minimal install check
        if: needs.changes.outputs.code != 'true'
        run: echo "Code inputs unchanged; marking minimal install check successful."
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        if: needs.changes.outputs.code == 'true'
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        if: needs.changes.outputs.code == 'true'
        with:
          python-version: '3.13'
      - name: Create venv
        if: needs.changes.outputs.code == 'true'
        run: python -m venv .venv
      - name: Ensure FFmpeg
        if: needs.changes.outputs.code == 'true'
        run: |
          if ! command -v ffmpeg &>/dev/null; then
            sudo apt-get update
            sudo apt-get install -y ffmpeg
          fi
      - name: Install package without extras
        if: needs.changes.outputs.code == 'true'
        run: .venv/bin/pip install -e . pytest pytest-asyncio
      - name: Bare install must import and pass doctor
        if: needs.changes.outputs.code == 'true'
        run: |
          .venv/bin/python -c "import mcp_video, mcp_video.server"
          .venv/bin/mcp-video doctor
      - name: Run extras-free test subset
        if: needs.changes.outputs.code == 'true'
        run: .venv/bin/pytest tests/test_public_surface.py tests/test_doctor.py tests/test_models.py tests/test_errors.py -q --tb=short

  slow-suite:
    name: Slow suite (real-media)
    needs: changes
    runs-on: blacksmith-2vcpu-ubuntu-2404
    steps:
      - name: Skip slow suite
        if: needs.changes.outputs.code != 'true'
        run: echo "Code inputs unchanged; marking slow suite successful."
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        if: needs.changes.outputs.code == 'true'
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        if: needs.changes.outputs.code == 'true'
        with:
          python-version: '3.13'
          cache: 'pip'
          cache-dependency-path: 'pyproject.toml'
      - name: Create venv
        if: needs.changes.outputs.code == 'true'
        run: python -m venv .venv
      - name: Ensure FFmpeg
        if: needs.changes.outputs.code == 'true'
        run: |
          if ! command -v ffmpeg &>/dev/null; then
            sudo apt-get update
            sudo apt-get install -y ffmpeg
          fi
      - name: Install dependencies
        if: needs.changes.outputs.code == 'true'
        run: .venv/bin/pip install -e ".[dev]"
      - name: Run slow tests
        if: needs.changes.outputs.code == 'true'
        run: .venv/bin/pytest tests/ -q -m "slow" --tb=short

  hyperframes-integration:
    name: Hyperframes integration (informational)
    needs: changes
    runs-on: blacksmith-2vcpu-ubuntu-2404
    # Informational until runner compatibility is proven: failures are logged
    # in the run, not blocking. Promote to a hard gate once stable.
    continue-on-error: true
    steps:
      - name: Skip hyperframes integration
        if: needs.changes.outputs.code != 'true'
        run: echo "Code inputs unchanged; marking hyperframes integration successful."
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        if: needs.changes.outputs.code == 'true'
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        if: needs.changes.outputs.code == 'true'
        with:
          python-version: '3.13'
          cache: 'pip'
          cache-dependency-path: 'pyproject.toml'
      - name: Create venv
        if: needs.changes.outputs.code == 'true'
        run: python -m venv .venv
      - name: Ensure FFmpeg
        if: needs.changes.outputs.code == 'true'
        run: |
          if ! command -v ffmpeg &>/dev/null; then
            sudo apt-get update
            sudo apt-get install -y ffmpeg
          fi
      - name: Install Hyperframes CLI
        if: needs.changes.outputs.code == 'true'
        run: |
          node --version
          npm install -g hyperframes
          hyperframes --version
      - name: Install dependencies
        if: needs.changes.outputs.code == 'true'
        run: .venv/bin/pip install -e ".[dev]"
      - name: Run hyperframes-marked tests
        if: needs.changes.outputs.code == 'true'
        run: .venv/bin/pytest tests/ -q -m "hyperframes" --tb=short

  ffmpeg-matrix:
    name: FFmpeg matrix (FFmpeg ${{ matrix.major }})
    needs: changes
    runs-on: blacksmith-2vcpu-ubuntu-2404
    # Cross-FFmpeg-version filtergraph portability matrix. The other test jobs
    # run a single apt/ubuntu ffmpeg, so a filtergraph that parses on ffmpeg 8
    # but not 6 (e.g. scale2ref rw/rh vars, added in ffmpeg 7 — the 2026-07-09
    # composite masked-render incident) slips through. This downloads pinned
    # static ffmpeg 6/7/8 builds and runs the render/filtergraph tests against
    # each. Mirror of the source-of-truth `.forgejo/workflows/ci.yml` job; keep
    # the two in parity. Static builds pinned to immutable BtbN release tags.
    strategy:
      fail-fast: false
      matrix:
        include:
          - major: "6"
            ffmpeg_tag: autobuild-2025-08-31-13-00
            ffmpeg_asset: ffmpeg-n6.1.3-linux64-gpl-6.1.tar.xz
          - major: "7"
            ffmpeg_tag: autobuild-2024-09-30-15-36
            ffmpeg_asset: ffmpeg-n7.1-linux64-gpl-7.1.tar.xz
          - major: "8"
            ffmpeg_tag: autobuild-2026-06-25-13-48
            ffmpeg_asset: ffmpeg-n8.1.2-linux64-gpl-8.1.tar.xz
    steps:
      - name: Skip FFmpeg matrix
        if: needs.changes.outputs.code != 'true'
        run: echo "Code inputs unchanged; marking FFmpeg ${{ matrix.major }} matrix successful."
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        if: needs.changes.outputs.code == 'true'
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        if: needs.changes.outputs.code == 'true'
        with:
          python-version: '3.13'
      - name: Create venv
        if: needs.changes.outputs.code == 'true'
        run: python -m venv .venv
      - name: Fetch pinned static FFmpeg ${{ matrix.major }}
        if: needs.changes.outputs.code == 'true'
        run: |
          set -euo pipefail
          url="https://github.com/BtbN/FFmpeg-Builds/releases/download/${{ matrix.ffmpeg_tag }}/${{ matrix.ffmpeg_asset }}"
          echo "Downloading $url"
          dest="${RUNNER_TEMP:-/tmp}/ffmpeg-static"
          mkdir -p "$dest"
          curl -fsSL --retry 3 --retry-delay 5 "$url" -o "${RUNNER_TEMP:-/tmp}/ffmpeg.tar.xz"
          tar -xf "${RUNNER_TEMP:-/tmp}/ffmpeg.tar.xz" -C "$dest"
          bindir="$(dirname "$(find "$dest" -type f -name ffmpeg | head -1)")"
          echo "Resolved static FFmpeg bin dir: $bindir"
          echo "$bindir" >> "$GITHUB_PATH"
      - name: Assert FFmpeg major is ${{ matrix.major }}
        if: needs.changes.outputs.code == 'true'
        run: |
          set -euo pipefail
          ver="$(ffmpeg -version | head -1)"
          echo "$ver"
          ffprobe -version | head -1
          case "$ver" in
            *"version n${{ matrix.major }}."*|*"version ${{ matrix.major }}."*)
              echo "FFmpeg major ${{ matrix.major }} confirmed." ;;
            *)
              echo "ERROR: expected FFmpeg major ${{ matrix.major }}, got: $ver" >&2
              exit 1 ;;
          esac
      - name: Install dependencies
        if: needs.changes.outputs.code == 'true'
        run: .venv/bin/pip install -e ".[dev]"
      - name: Run filtergraph render tests
        # Explicit file list = the filtergraph render surface. Runs slow AND
        # not-slow: the masked-render regression test is gated on ffmpeg presence,
        # not `slow`, so `-m slow` would miss the scale2ref surface. Not the whole
        # suite (keeps the 3-leg cost bounded).
        if: needs.changes.outputs.code == 'true'
        run: |
          .venv/bin/pytest -q --tb=short -n 4 \
            tests/test_engine_composite_layers.py \
            tests/test_server_tools_composite_layers.py \
            tests/test_workflow_golden.py \
            tests/test_engine_overlay.py \
            tests/test_engine_filters.py \
            tests/test_engine_glitch.py \
            tests/test_transitions.py \
            tests/test_engine_advanced.py \
            tests/test_real_media.py \
            tests/test_effects_engine.py

  docker:
    name: Docker build
    needs: changes
    runs-on: blacksmith-2vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Skip Docker build
        if: needs.changes.outputs.docker != 'true'
        run: echo "Docker inputs unchanged; marking Docker check successful."
      - name: Build Docker image
        if: needs.changes.outputs.docker == 'true'
        run: docker build -t mcp-video:test .
