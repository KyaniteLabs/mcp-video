name: Publish to PyPI

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write  # Required for OIDC trusted publishing

jobs:
  surface-audit:
    name: Check tracked release surface
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Check forbidden tracked artifacts
        run: python3 .github/scripts/check-forbidden-artifacts.py

  build:
    name: Build package
    needs: surface-audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0  # Needed for hatch-vcs if ever adopted
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install build dependencies
        run: pip install build twine
      - name: Build package
        run: python -m build
      - name: Check built artifact contents
        run: python3 .github/scripts/check-built-artifacts.py dist
      - name: Validate distribution metadata
        run: python -m twine check dist/*
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
